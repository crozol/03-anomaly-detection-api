services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cmapss-anomaly:latest
    container_name: cmapss-api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Optional: mount data/raw read-only so the Streamlit "built-in engine"
    # button works without rebuilding the image. Comment out if not used.
    volumes:
      - ./data/raw:/app/data/raw:ro

  demo:
    image: cmapss-anomaly:latest
    container_name: cmapss-demo
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    command:
      [
        "streamlit",
        "run",
        "src/app_streamlit.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
        "--server.headless=true",
        "--browser.gatherUsageStats=false",
      ]
    volumes:
      - ./data/raw:/app/data/raw:ro
